name: Create PR comment artifact
description: Creates an artifact to post a PR comment via the centralized post-pr-comments workflow.

inputs:
  name:
    description: Name for the artifact (will be prefixed with "pr-comment-")
    required: true
  pr-number:
    description: The pull request number
    required: true
  message:
    description: The comment message body
    required: true
  comment-tag:
    description: Unique tag for upserting/deleting comments
    required: true
  mode:
    description: Either "upsert" or "delete"
    required: false
    default: upsert

runs:
  using: composite
  steps:
    - name: Prepare comment artifact
      shell: bash
      run: |
        echo "${INPUTS_PR_NUMBER}" > pr-number.txt
        echo "${INPUTS_COMMENT_TAG}" > comment-tag.txt
        echo "${INPUTS_MODE}" > mode.txt
        echo "${INPUTS_MESSAGE}" > message.txt
        echo "artifact_id=$(date +%s%N)-$$" >> $GITHUB_ENV
      env:
        INPUTS_PR_NUMBER: ${{ inputs.pr-number }}
        INPUTS_COMMENT_TAG: ${{ inputs.comment-tag }}
        INPUTS_MODE: ${{ inputs.mode }}
        INPUTS_MESSAGE: ${{ inputs.message }}

    - name: Upload comment artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: pr-comment-${{ inputs.name }}-${{ env.artifact_id }}
        path: |
          pr-number.txt
          comment-tag.txt
          mode.txt
          message.txt
